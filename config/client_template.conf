# WireGuard Client Configuration Template
# Generated by IPv6 WireGuard Manager
# Version: 1.0.0

[Interface]
# 客户端私钥 (将由系统生成)
PrivateKey = CLIENT_PRIVATE_KEY

# 客户端IP地址
Address = CLIENT_IPV4/32, CLIENT_IPV6/128

# DNS服务器
DNS = 8.8.8.8, 2001:4860:4860::8888

# MTU设置
MTU = 1420

# 预共享密钥 (可选)
# PresharedKey = PRESHARED_KEY

# 连接后执行的命令 (可选)
# PostUp = echo "Connected to VPN"
# PostDown = echo "Disconnected from VPN"

[Peer]
# 服务器公钥
PublicKey = SERVER_PUBLIC_KEY

# 服务器端点
Endpoint = SERVER_ENDPOINT:51820

# 允许的IP地址 (0.0.0.0/0 表示所有IPv4流量，::/0 表示所有IPv6流量)
AllowedIPs = 0.0.0.0/0, ::/0

# 保持连接间隔 (秒)
PersistentKeepalive = 25

# 预共享密钥 (可选，与服务器端相同)
# PresharedKey = PRESHARED_KEY

# 连接超时 (秒)
# HandshakeTimeout = 180

# 连接重试间隔 (秒)
# ReconnectInterval = 30

# 最大重试次数
# MaxRetries = 3
