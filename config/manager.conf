# IPv6 WireGuard Manager 主配置文件
# 版本: 1.0.0
# 生成时间: 2024-01-01

# =============================================================================
# WireGuard配置
# =============================================================================

# WireGuard监听端口
WIREGUARD_PORT=51820

# WireGuard接口名称
WIREGUARD_INTERFACE=wg0

# WireGuard IPv4网络
WIREGUARD_NETWORK=10.0.0.0/24

# WireGuard IPv6网络
WIREGUARD_IPV6_NETWORK=2001:db8::/64

# =============================================================================
# IPv6配置
# =============================================================================

# IPv6前缀
IPV6_PREFIX=2001:db8::/56

# IPv6子网长度
IPV6_SUBNET_LENGTH=64

# IPv6客户端前缀长度
IPV6_CLIENT_PREFIX_LENGTH=128

# =============================================================================
# BIRD BGP配置
# =============================================================================

# BIRD版本 (auto, 1.x, 2.x, 3.x)
BIRD_VERSION=auto

# BIRD路由器ID (auto 或具体IP地址)
BIRD_ROUTER_ID=auto

# BIRD本地AS号
BIRD_LOCAL_AS=64512

# BIRD配置目录
BIRD_CONFIG_DIR=/etc/bird

# =============================================================================
# 防火墙配置
# =============================================================================

# 防火墙类型 (auto, ufw, firewalld, nftables, iptables)
FIREWALL_TYPE=auto

# 允许的端口
ALLOWED_PORTS=22,80,443,51820

# 防火墙规则前缀
FIREWALL_RULE_PREFIX=ipv6-wg

# =============================================================================
# Web管理界面配置
# =============================================================================

# Web服务端口
WEB_PORT=8080

# Web管理用户名
WEB_USER=admin

# Web管理密码
WEB_PASS=admin123

# Web根目录
WEB_ROOT=/var/www/ipv6-wireguard-manager

# SSL证书路径
SSL_CERT_PATH=/etc/ssl/certs/ipv6-wg-manager.crt

# SSL私钥路径
SSL_KEY_PATH=/etc/ssl/private/ipv6-wg-manager.key

# =============================================================================
# 日志配置
# =============================================================================

# 日志级别 (DEBUG, INFO, WARN, ERROR)
LOG_LEVEL=INFO

# 日志文件路径
LOG_FILE=/var/log/ipv6-wireguard-manager/manager.log

# 错误日志文件路径
ERROR_LOG_FILE=/var/log/ipv6-wireguard-manager/errors.log

# 日志轮转大小 (MB)
LOG_ROTATE_SIZE=100

# 保留的日志文件数量
LOG_RETENTION_COUNT=7

# =============================================================================
# 备份配置
# =============================================================================

# 备份目录
BACKUP_DIR=/var/backups/ipv6-wireguard

# 自动备份间隔 (小时)
BACKUP_INTERVAL=24

# 保留的备份数量
BACKUP_RETENTION_COUNT=30

# 备份压缩
BACKUP_COMPRESS=true

# =============================================================================
# 客户端配置
# =============================================================================

# 客户端配置目录
CLIENT_CONFIG_DIR=/etc/wireguard/clients

# 客户端密钥目录
CLIENT_KEYS_DIR=/etc/wireguard/keys

# 客户端DNS服务器
CLIENT_DNS_SERVERS=8.8.8.8,2001:4860:4860::8888

# 客户端MTU
CLIENT_MTU=1420

# 客户端Keepalive间隔
CLIENT_KEEPALIVE=25

# =============================================================================
# 监控配置
# =============================================================================

# 启用监控
MONITORING_ENABLED=true

# 监控间隔 (秒)
MONITORING_INTERVAL=60

# 离线检测超时 (秒)
OFFLINE_TIMEOUT=300

# 告警邮箱
ALERT_EMAIL=""

# 告警Webhook
ALERT_WEBHOOK=""

# =============================================================================
# 安全配置
# =============================================================================

# 启用密钥轮换
KEY_ROTATION_ENABLED=false

# 密钥轮换间隔 (天)
KEY_ROTATION_INTERVAL=90

# 启用访问控制
ACCESS_CONTROL_ENABLED=true

# 允许的IP地址
ALLOWED_IPS=""

# 禁止的IP地址
BLOCKED_IPS=""

# 密码策略
SECURITY_PASSWORD_MIN_LENGTH=8
SECURITY_PASSWORD_REQUIRE_UPPERCASE=true
SECURITY_PASSWORD_REQUIRE_LOWERCASE=true
SECURITY_PASSWORD_REQUIRE_NUMBERS=true
SECURITY_PASSWORD_REQUIRE_SPECIAL_CHARS=false

# 会话管理
SECURITY_SESSION_TIMEOUT=3600
SECURITY_MAX_LOGIN_ATTEMPTS=5
SECURITY_LOCKOUT_DURATION=300

# 输入验证
SECURITY_INPUT_SANITIZATION=true
SECURITY_SQL_INJECTION_PROTECTION=true
SECURITY_XSS_PROTECTION=true

# =============================================================================
# 系统配置
# =============================================================================

# 安装目录
INSTALL_DIR=/opt/ipv6-wireguard-manager

# 配置目录
CONFIG_DIR=/etc/ipv6-wireguard-manager

# 日志目录
LOG_DIR=/var/log/ipv6-wireguard-manager

# 临时目录
TEMP_DIR=/tmp/ipv6-wireguard-manager

# 锁文件路径
LOCK_FILE=/var/lock/ipv6-wireguard-manager.lock

# =============================================================================
# 网络配置
# =============================================================================

# 主网络接口
PRIMARY_INTERFACE=auto

# 公网IP地址 (auto 或具体IP)
PUBLIC_IP=auto

# 公网IPv6地址 (auto 或具体IP)
PUBLIC_IPV6=auto

# 启用IP转发
IP_FORWARDING_ENABLED=true

# =============================================================================
# 性能配置
# =============================================================================

# 最大并发连接数
MAX_CONNECTIONS=1000

# 连接超时 (秒)
CONNECTION_TIMEOUT=30

# 缓冲区大小 (KB)
BUFFER_SIZE=64

# 启用压缩
COMPRESSION_ENABLED=false

# =============================================================================
# 更新配置
# =============================================================================

# 启用自动更新检查
AUTO_UPDATE_CHECK=true

# 更新检查间隔 (小时)
UPDATE_CHECK_INTERVAL=24

# 更新服务器URL
UPDATE_SERVER_URL=https://api.github.com/repos/example/ipv6-wireguard-manager/releases/latest

# =============================================================================
# 调试配置
# =============================================================================

# 启用调试模式
DEBUG_MODE=false

# 详细日志
VERBOSE_LOGGING=false

# 性能分析
PROFILING_ENABLED=false

# 内存使用限制 (MB)
MEMORY_LIMIT=512
