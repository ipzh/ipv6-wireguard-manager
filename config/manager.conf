# IPv6 WireGuard Manager 主配置文件
# 版本: 1.12
# 生成时间: 2024-01-01 12:00:00

[general]
# 管理器版本
version = 1.12

# 安装目录
install_dir = /opt/ipv6-wireguard-manager

# 日志级别 (error, warn, info, debug)
log_level = info

# 配置文件目录
config_dir = /etc/ipv6-wireguard

# 日志目录
log_dir = /var/log/ipv6-wireguard

# 备份目录
backup_dir = /var/backups/ipv6-wireguard

[wireguard]
# WireGuard默认端口
default_port = 51820

# WireGuard接口名称
default_interface = wg0

# WireGuard配置目录
config_dir = /etc/wireguard

# 服务器IPv4地址段
server_ipv4_network = 10.0.0.0/24

# 服务器IPv6地址段
server_ipv6_network = 2001:db8::/48

# 客户端IPv4地址段
client_ipv4_network = 10.0.0.0/24

# 客户端IPv6地址段
client_ipv6_network = 2001:db8::/48

# 密钥轮换间隔（天）
key_rotation_days = 90

# 预共享密钥
use_preshared_key = true

[bird]
# BIRD配置文件路径
config_file = /etc/bird/bird.conf

# 默认AS号
default_as = 65001

# 路由器ID
router_id = 10.0.0.1

# BGP邻居配置
neighbors = 

# IPv6前缀宣告
ipv6_prefixes = 2001:db8::/48

# 连接重试时间（秒）
connect_retry_time = 30

# 保持时间（秒）
hold_time = 180

# 保活时间（秒）
keepalive_time = 60

[clients]
# 客户端配置目录
config_dir = /etc/ipv6-wireguard/clients

# 客户端数据库文件
database_file = /etc/ipv6-wireguard/clients.db

# 客户端配置模板
config_template = /opt/ipv6-wireguard-manager/config/client_template.conf

# 最大客户端数量
max_clients = 1000

# 客户端地址分配策略 (sequential, random)
address_allocation = sequential

# 自动清理不活跃客户端（天）
cleanup_inactive_days = 30

[firewall]
# 自动配置防火墙
auto_configure = true

# 防火墙类型 (auto, ufw, firewalld, nftables, iptables)
firewall_type = auto

# 默认策略 (allow, deny)
default_policy = deny

# 允许的端口
allowed_ports = 22,51820

# 允许的服务
allowed_services = ssh

# 自动添加WireGuard规则
auto_wireguard_rules = true

# 自动添加BGP规则
auto_bgp_rules = false

[security]
# 启用fail2ban
enable_fail2ban = true

# fail2ban配置文件
fail2ban_config = /etc/fail2ban/jail.d/wireguard.conf

# 最大登录尝试次数
max_login_attempts = 5

# 封禁时间（秒）
ban_time = 3600

# 启用密钥轮换
enable_key_rotation = true

# 密钥轮换通知
key_rotation_notification = true

[monitoring]
# 启用监控
enable_monitoring = true

# 监控间隔（秒）
monitor_interval = 60

# 连接超时告警（秒）
connection_timeout_alert = 300

# 流量统计
enable_traffic_stats = true

# 性能监控
enable_performance_monitoring = true

# 日志监控
enable_log_monitoring = true

[backup]
# 自动备份
auto_backup = true

# 备份间隔（小时）
backup_interval = 24

# 保留备份数量
backup_retention = 7

# 备份压缩
backup_compression = true

# 备份加密
backup_encryption = false

[update]
# 自动检查更新
auto_check_update = true

# 检查更新间隔（天）
update_check_interval = 7

# 自动安装更新
auto_install_update = false

# 更新通知
update_notification = true

# 更新源
update_source = https://github.com/ipv6-wireguard-manager/ipv6-wireguard-manager

[network]
# 网络接口
interface = eth0

# 公网IP检测服务
public_ip_services = https://ipv4.icanhazip.com,https://api.ipify.org,https://checkip.amazonaws.com

# IPv6公网IP检测服务
public_ipv6_services = https://ipv6.icanhazip.com

# DNS服务器
dns_servers = 8.8.8.8,2001:4860:4860::8888

# 网络超时（秒）
network_timeout = 10

# 连接重试次数
connection_retries = 3

[logging]
# 日志文件路径
log_file = /var/log/ipv6-wireguard/manager.log

# 日志轮转
log_rotation = true

# 日志文件大小限制（MB）
log_max_size = 100

# 保留日志文件数量
log_retention = 10

# 日志格式
log_format = %(asctime)s - %(name)s - %(levelname)s - %(message)s

# 日志编码
log_encoding = utf-8
