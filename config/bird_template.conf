# BIRD BGP配置文件模板
# 此文件用于生成BIRD BGP配置
# 变量说明:
#   {ROUTER_ID} - 路由器ID
#   {AS_NUMBER} - AS号
#   {IPV6_PREFIXES} - IPv6前缀列表
#   {NEIGHBORS} - BGP邻居列表

# BIRD BGP Configuration for IPv6 WireGuard
# Generated by IPv6 WireGuard Manager
# Router ID: {ROUTER_ID}
# AS Number: {AS_NUMBER}

# 路由器ID
router id {ROUTER_ID};

# 设备协议
protocol device {
    scan time 10;
}

# 内核协议 - 处理路由表
protocol kernel {
    ipv6 {
        import all;
        export all;
    };
    learn;
    scan time 20;
}

# 直连协议 - 处理直连网络
protocol direct {
    ipv6;
    interface "wg0";
}

# BGP协议配置
protocol bgp {
    local as {AS_NUMBER};
    
    # BGP邻居配置
    # 请根据实际情况配置邻居信息
    # neighbor 2001:db8::1 as 65000;
    
    ipv6 {
        import filter bgp_import;
        export filter bgp_export;
    };
    
    # 连接参数
    connect retry time 30;
    connect retry time 60;
    hold time 180;
    keepalive time 60;
}

# 静态路由配置
protocol static {
    ipv6;
    
    # 宣告IPv6前缀
    # 请根据实际情况配置IPv6前缀
    # route 2001:db8::/48 via 2001:db8::1;
    {IPV6_PREFIXES}
}

# 过滤规则
filter bgp_import {
    # 接受所有路由
    accept;
}

filter bgp_export {
    # 导出所有路由
    accept;
}

# 日志配置
log syslog { debug, trace, info, remote, warning, error, auth, fatal, bug };
log "/var/log/bird/bird.log" { info, remote, warning, error, auth, fatal, bug };
