# IPv6-WireGuard管理器 变量命名规范配置文件

# ================================================================
# Shell变量命名规范
# ================================================================

# 全局配置变量 (大写+下划线)
# 格式: GLOBAL_CONFIG_MODULE_SUFFIX
# 示例: WG_INTERFACE_NAME, BGP_REGION_NAME
GLOBAL_CONFIG_PREFIX="IPV6WGM_"

# 环境变量 (大写+下划线)  
# 格式: MODULE_SETTING_NAME
# 示例: WG_ADMIN_PASSWORD, DB_CONNECTION_TIMEOUT
ENV_VAR_PREFIX="IPV6WGM_"

# 局部变量 (小写+下划线)
# 格式: module_function_variable_name
# 示例: wg_interface_config, bgp_peer_count
LOCAL_VAR_PREFIX=""

# 临时变量 (前缀: tmp_)
# 格式: tmp_description_purpose
# 示例: tmp_config_backup, tmp_error_log
TEMP_VAR_PREFIX="tmp_"

# ================================================================
# 函数命名规范
# ================================================================

# 核心函数 (驼峰命名)
# 格式: moduleVerbDescription()
# 示例: wireguardConfigGenerate(), bgpPeerAdd()
CORE_FUNCTION_PATTERN="[a-z]+[A-Z][a-zA-Z]*[A-Z][a-z]*"

# 工具函数 (小写+下划线)
# 格式: module_action_object()
# 示例: validate_config_file(), generate_wireguard_key()
UTILITY_FUNCTION_PATTERN="[a-z]+_[a-z]+_[a-z_]*"

# 事件处理函数 (前缀: 事件名_)
# 格式: event_type_description()
# 示例: bgp_peer_disconnect(), error_handle_network()
EVENT_FUNCTION_PATTERN="[a-z]+_[a-z_]+"

# ================================================================
# 配置文件命名规范
# ================================================================

# 主配置文件
# 格式: feature.conf
# 示例: wireguard.conf, bgp.conf, firewall.conf
MAIN_CONFIG_SUFFIX=".conf"

# 模板文件
# 格式: feature_template.conf.template
# 示例: wireguard_template.conf.template
TEMPLATE_SUFFIX=".template"

# 备份文件
# 格式: feature.conf.backup.YYYYMMDD_HHMMSS
# 示例: wireguard.conf.backup.20231215_143022
BACKUP_SUFFIX=".backup"

# 临时文件
# 格式: feature.conf.tmp.$$
TEMP_SUFFIX=".tmp"

# ================================================================
# 日志命名规范
# ================================================================

# 日志文件
# 格式: module_feature.YYYY-MM-DD.log
# 示例: wireguard_config.2023-12-15.log
LOG_FILE_PATTERN="[a-z]+_[a-z]+\\.[0-9]{4}-[0-9]{2}-[0-9]{2}\\.log"

# 调试日志
# 格式: module_feature.debug.YYYY-MM-DD.log
DEBUG_LOG_PATTERN="[a-z]+_[a-z]+\\.debug\\.[0-9]{4}-[0-9]{2}-[0-9]{2}\\.log"

# 错误日志
# 格式: module_feature.error.YYYY-MM-DD.log
ERROR_LOG_PATTERN="[a-z]+_[a-z]+\\.error\\.[0-9]{4}-[0-9]{2}-[0-9]{2}\\.log"

# ================================================================
# 目录命名规范
# ================================================================

# 配置目录
# 格式: config/
CONFIG_DIR_PATTERN="config"

# 模块目录
# 格式: modules/
MODULE_DIR_PATTERN="modules"

# 临时目录
# 格式: temp/ 或 /tmp/ipv6-wg-manager/
TEMP_DIR_PATTERN="temp|tmp"

# 备份目录
# 格式: backup/
BACKUP_DIR_PATTERN="backup"

# 日志目录
# 格式: logs/
LOG_DIR_PATTERN="logs"

# ================================================================
# API接口命名规范
# ================================================================

# REST API端点
# 格式: /api/v1/module/resource
# 示例: /api/v1/wireguard/peers, /api/v1/bgp/routes
API_ENDPOINT_PATTERN="/api/v[0-9]+/[a-z]+/[a-z_]+"

# WebSocket端点
# 格式: /ws/module/feature
# 示例: /ws/wireguard/status, /ws/bgp/live_updates
WEBSOCKET_ENDPOINT_PATTERN="/ws/[a-z]+/[a-z_]+"

# ================================================================
# 数据库命名规范
# ================================================================

# 表名 (小写+下划线)
# 格式: module_feature_suffix
# 示例: wireguard_peers, bgp_routes, user_sessions
DB_TABLE_PATTERN="[a-z]+_[a-z_]+"

# 列名 (小写+下划线)
# 格式: feature_description
# 示例: peer_public_key, route_destination
DB_COLUMN_PATTERN="[a-z]+_[a-z_]*"

# 约束名
# 格式: constraint_type_table_column
# 示例: pk_wireguard_peers_id, fk_routes_peer_id
DB_CONSTRAINT_PATTERN="(?:pk|fk|uk|idx)_[a-z]+_[a-z_]+"

# ================================================================
# 常用变量映射
# ================================================================

# 时间相关
# TIMESTAMP_FORMAT = "%Y-%m-%d %H:%M:%S"
# DATE_FORMAT = "%Y-%m-%d"
# TIME_FORMAT = "%H:%M:%S"

# IP地址相关
# IPV4_ADDRESS = "^[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}$"
# IPV6_ADDRESS = "^([0-9a-fA-F]{0,4}:){2,7}[0-9a-fA-F]{0,4}$"

# 端口相关
# VALID_PORT_RANGE = "^([1-9][0-9]{0,3}|[1-5][0-9]{4}|6[0-4][0-9]{3}|65[0-4][0-9]{2}|655[0-2][0-9]|6553[0-5])$"

# WireGuard相关
# WG_KEY_LENGTH = 32
# WG_PORT_RANGE = "1-65535"

# BGP相关
# ASN_RANGE = "1-4294967295"
# COMMUNITY_FORMAT = "^[0-9]+:[0-9]+$"
