# IPv6-WireGuard管理器 性能优化配置文件

# ================================================================
# 性能监控配置
# ================================================================
CPU_THRESHOLD=80
MEMORY_THRESHOLD=85
DISK_THRESHOLD=90
NETWORK_THRESHOLD=1000000
CHECK_INTERVAL=60

# ================================================================
# 缓存配置
# ================================================================
CACHE_ENABLED=true
CACHE_TIMEOUT=300
CACHE_MAX_SIZE=1000
CACHE_CLEANUP_INTERVAL=3600

# ================================================================
# 线程池配置
# ================================================================
WORKER_THREADS=4
MAX_CONCURRENT_OPS=10
OP_TIMEOUT=30

# ================================================================
# 批处理配置
# ================================================================
BATCH_SIZE=100
BATCH_DELAY=0.5
BATCH_LIMIT=1000

# ================================================================
# 连接池配置
# ================================================================
CONNECTION_POOL_SIZE=20
CONNECTION_TIMEOUT=30
KEEPALIVE_INTERVAL=60

# ================================================================
# 内存优化配置
# ================================================================
LAZY_LOADING=true
MEMORY_LIMIT=0
GC_THRESHOLD=0.75
BUFFER_SIZE=8192

# ================================================================
# 网络优化配置
# ================================================================
RATE_LIMITING=true
MAX_REQUESTS_PER_SECOND=100
CONN_TIMEOUT=30
READ_TIMEOUT=60
WRITE_TIMEOUT=60

# ================================================================
# 日志优化配置
# ================================================================
LOG_LEVEL=INFO
LOG_ROTATION_SIZE=10M
LOG_RETENTION_DAYS=7
LOG_BUFFER_SIZE=8192

# ================================================================
# WireGuard 性能配置
# ================================================================
WG_THREAD_COUNT=0
WG_ALLOWED_IPS_TIMEOUT=300
WG_COOKIE_TIMEOUT=60
WG_DH_SIZE=3072

# ================================================================
# BIRD路由性能配置
# ================================================================
BIRD_MEMORY_LIMIT=256M
BIRD_CONFIG_CHECK_INTERVAL=60
BIRD_LOG_RETAIN=7
BIRD_DUMP_TIMEOUT=30

# ================================================================
# 自动优化配置
# ================================================================
AUTO_OPTIMIZE_ENABLED=true
OPTIMIZE_INTERVAL=3600
OPTIMIZE_ON_STARTUP=true
OPTIMIZE_ON_EXIT=false

# ================================================================
# 系统限制配置
# ================================================================
MAX_FILE_SIZE=100M
MAX_LOG_SIZE=50M
MAX_CONFIG_SIZE=1M
MAX_CACHE_SIZE=500M
