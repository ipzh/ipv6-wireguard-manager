# 防火墙规则配置文件
# 此文件定义了各种防火墙类型的规则模板

[ufw]
# UFW防火墙规则
# 基本规则
basic_rules = |
    # 重置UFW规则
    ufw --force reset
    
    # 设置默认策略
    ufw default deny incoming
    ufw default allow outgoing
    
    # 允许SSH
    ufw allow 22/tcp comment 'SSH'
    
    # 允许WireGuard
    ufw allow 51820/udp comment 'WireGuard'
    
    # 允许回环接口
    ufw allow in on lo
    ufw allow out on lo
    
    # 启用UFW
    ufw --force enable

# 高级规则
advanced_rules = |
    # 限制SSH连接
    ufw limit 22/tcp comment 'SSH (limited)'
    
    # 允许特定IP访问SSH
    # ufw allow from 192.168.1.0/24 to any port 22 comment 'SSH from LAN'
    
    # 允许HTTP/HTTPS
    ufw allow 80/tcp comment 'HTTP'
    ufw allow 443/tcp comment 'HTTPS'
    
    # 允许DNS
    ufw allow 53/udp comment 'DNS'
    
    # 允许NTP
    ufw allow 123/udp comment 'NTP'

[firewalld]
# Firewalld防火墙规则
# 基本规则
basic_rules = |
    # 启动并启用firewalld
    systemctl enable firewalld
    systemctl start firewalld
    
    # 添加WireGuard端口
    firewall-cmd --permanent --add-port=51820/udp
    firewall-cmd --permanent --add-service=ssh
    
    # 允许WireGuard接口
    firewall-cmd --permanent --add-interface=wg0
    firewall-cmd --permanent --zone=trusted --add-interface=wg0
    
    # 允许转发
    firewall-cmd --permanent --add-masquerade
    
    # 重新加载配置
    firewall-cmd --reload

# 高级规则
advanced_rules = |
    # 添加HTTP/HTTPS服务
    firewall-cmd --permanent --add-service=http
    firewall-cmd --permanent --add-service=https
    
    # 添加DNS服务
    firewall-cmd --permanent --add-service=dns
    
    # 添加NTP服务
    firewall-cmd --permanent --add-service=ntp
    
    # 限制SSH访问
    # firewall-cmd --permanent --add-rich-rule='rule family="ipv4" source address="192.168.1.0/24" service name="ssh" accept'
    
    # 重新加载配置
    firewall-cmd --reload

[nftables]
# nftables防火墙规则
# 基本规则
basic_rules = |
    #!/usr/sbin/nft -f
    
    # 清空现有规则
    flush ruleset
    
    # 定义表
    table inet filter {
        chain input {
            type filter hook input priority 0; policy drop;
            
            # 允许回环接口
            iif lo accept
            
            # 允许已建立的连接
            ct state established,related accept
            
            # 允许SSH
            tcp dport 22 accept
            
            # 允许WireGuard
            udp dport 51820 accept
            
            # 允许ICMP
            icmp type echo-request accept
            icmpv6 type echo-request accept
        }
        
        chain forward {
            type filter hook forward priority 0; policy drop;
            
            # 允许已建立的连接
            ct state established,related accept
            
            # 允许WireGuard接口转发
            iif wg0 accept
            oif wg0 accept
        }
        
        chain output {
            type filter hook output priority 0; policy accept;
        }
    }
    
    # NAT表
    table inet nat {
        chain postrouting {
            type nat hook postrouting priority 100; policy accept;
            
            # WireGuard接口NAT
            oifname "eth0" masquerade
        }
    }

# 高级规则
advanced_rules = |
    #!/usr/sbin/nft -f
    
    # 清空现有规则
    flush ruleset
    
    # 定义表
    table inet filter {
        chain input {
            type filter hook input priority 0; policy drop;
            
            # 允许回环接口
            iif lo accept
            
            # 允许已建立的连接
            ct state established,related accept
            
            # 限制SSH连接
            tcp dport 22 limit rate 5/minute accept
            
            # 允许WireGuard
            udp dport 51820 accept
            
            # 允许HTTP/HTTPS
            tcp dport 80 accept
            tcp dport 443 accept
            
            # 允许DNS
            udp dport 53 accept
            
            # 允许NTP
            udp dport 123 accept
            
            # 允许ICMP
            icmp type echo-request accept
            icmpv6 type echo-request accept
        }
        
        chain forward {
            type filter hook forward priority 0; policy drop;
            
            # 允许已建立的连接
            ct state established,related accept
            
            # 允许WireGuard接口转发
            iif wg0 accept
            oif wg0 accept
        }
        
        chain output {
            type filter hook output priority 0; policy accept;
        }
    }
    
    # NAT表
    table inet nat {
        chain postrouting {
            type nat hook postrouting priority 100; policy accept;
            
            # WireGuard接口NAT
            oifname "eth0" masquerade
        }
    }

[iptables]
# iptables防火墙规则
# 基本规则
basic_rules = |
    # 清空现有规则
    iptables -F
    iptables -t nat -F
    iptables -t mangle -F
    iptables -X
    iptables -t nat -X
    iptables -t mangle -X
    
    # 设置默认策略
    iptables -P INPUT DROP
    iptables -P FORWARD DROP
    iptables -P OUTPUT ACCEPT
    
    # 允许回环接口
    iptables -A INPUT -i lo -j ACCEPT
    iptables -A OUTPUT -o lo -j ACCEPT
    
    # 允许已建立的连接
    iptables -A INPUT -m state --state ESTABLISHED,RELATED -j ACCEPT
    iptables -A FORWARD -m state --state ESTABLISHED,RELATED -j ACCEPT
    
    # 允许SSH
    iptables -A INPUT -p tcp --dport 22 -j ACCEPT
    
    # 允许WireGuard
    iptables -A INPUT -p udp --dport 51820 -j ACCEPT
    
    # 允许ICMP
    iptables -A INPUT -p icmp -j ACCEPT
    
    # WireGuard转发规则
    iptables -A FORWARD -i wg0 -j ACCEPT
    iptables -A FORWARD -o wg0 -j ACCEPT
    
    # NAT规则
    iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
    
    # IPv6规则
    ip6tables -F
    ip6tables -P INPUT DROP
    ip6tables -P FORWARD DROP
    ip6tables -P OUTPUT ACCEPT
    
    ip6tables -A INPUT -i lo -j ACCEPT
    ip6tables -A OUTPUT -o lo -j ACCEPT
    ip6tables -A INPUT -m state --state ESTABLISHED,RELATED -j ACCEPT
    ip6tables -A FORWARD -m state --state ESTABLISHED,RELATED -j ACCEPT
    ip6tables -A INPUT -p udp --dport 51820 -j ACCEPT
    ip6tables -A INPUT -p ipv6-icmp -j ACCEPT
    ip6tables -A FORWARD -i wg0 -j ACCEPT
    ip6tables -A FORWARD -o wg0 -j ACCEPT

# 高级规则
advanced_rules = |
    # 清空现有规则
    iptables -F
    iptables -t nat -F
    iptables -t mangle -F
