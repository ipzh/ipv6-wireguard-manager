# IPv6 WireGuard Manager Docker Compose配置

version: '3.8'

services:
  ipv6-wireguard-manager:
    build: .
    container_name: ipv6-wireguard-manager
    restart: unless-stopped
    privileged: true
    network_mode: host
    volumes:
      - /etc/ipv6-wireguard-manager:/etc/ipv6-wireguard-manager
      - /var/log/ipv6-wireguard-manager:/var/log/ipv6-wireguard-manager
      - /lib/modules:/lib/modules:ro
      - /usr/src:/usr/src:ro
    environment:
      - IPV6WGM_LOG_LEVEL=INFO
      - IPV6WGM_DEBUG_MODE=false
      - IPV6WGM_CONFIG_DIR=/etc/ipv6-wireguard-manager
      - IPV6WGM_LOG_DIR=/var/log/ipv6-wireguard-manager
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    healthcheck:
      test: ["CMD", "/opt/ipv6-wireguard-manager/ipv6-wireguard-manager.sh", "--health-check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 测试服务
  ipv6-wireguard-manager-test:
    build: .
    container_name: ipv6-wireguard-manager-test
    command: ["/opt/ipv6-wireguard-manager/tests/run_tests.sh", "all"]
    volumes:
      - ./tests:/opt/ipv6-wireguard-manager/tests
      - ./test-results:/tmp/ipv6wgm_test_results
    environment:
      - IPV6WGM_LOG_LEVEL=DEBUG
      - IPV6WGM_DEBUG_MODE=true
    profiles:
      - testing

networks:
  default:
    driver: bridge
