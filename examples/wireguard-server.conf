# IPv6 WireGuard Server 配置示例
# 文件名: wireguard-server.conf
# 位置: /etc/wireguard/wg0.conf

[Interface]
# 服务器私钥（由系统自动生成）
PrivateKey = YOUR_SERVER_PRIVATE_KEY

# 服务器地址（IPv4和IPv6）
Address = 10.0.0.1/24, 2001:db8::1/64

# 监听端口
ListenPort = 51820

# 服务器公钥（用于客户端配置）
# PublicKey = YOUR_SERVER_PUBLIC_KEY

# 预共享密钥（可选，增强安全性）
# PresharedKey = YOUR_PRESHARED_KEY

# 启动后执行的命令
PostUp = iptables -A FORWARD -i %i -j ACCEPT; iptables -A FORWARD -o %i -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
PostUp = ip6tables -A FORWARD -i %i -j ACCEPT; ip6tables -A FORWARD -o %i -j ACCEPT; ip6tables -t nat -A POSTROUTING -o eth0 -j MASQUERADE

# 停止前执行的命令
PostDown = iptables -D FORWARD -i %i -j ACCEPT; iptables -D FORWARD -o %i -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE
PostDown = ip6tables -D FORWARD -i %i -j ACCEPT; ip6tables -D FORWARD -o %i -j ACCEPT; ip6tables -t nat -D POSTROUTING -o eth0 -j MASQUERADE

# 客户端配置示例
[Peer]
# 客户端公钥
PublicKey = CLIENT_PUBLIC_KEY_1

# 允许的IP地址范围
AllowedIPs = 10.0.0.2/32, 2001:db8::2/128

# 预共享密钥（可选）
# PresharedKey = CLIENT_PRESHARED_KEY_1

# 保持连接（可选）
# PersistentKeepalive = 25

[Peer]
PublicKey = CLIENT_PUBLIC_KEY_2
AllowedIPs = 10.0.0.3/32, 2001:db8::3/128

[Peer]
PublicKey = CLIENT_PUBLIC_KEY_3
AllowedIPs = 10.0.0.4/32, 2001:db8::4/128

# 更多客户端配置...
