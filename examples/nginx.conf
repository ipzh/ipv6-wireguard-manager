# Nginx Web服务器配置示例
# 文件名: ipv6-wireguard-manager
# 位置: /etc/nginx/sites-available/ipv6-wireguard-manager

server {
    listen 8080;
    listen [::]:8080;
    
    server_name _;
    
    # 安全头设置
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
    
    # 根目录
    root /opt/ipv6-wireguard-manager/web;
    index index.html index.php;
    
    # 日志配置
    access_log /var/log/nginx/ipv6-wireguard-manager.access.log;
    error_log /var/log/nginx/ipv6-wireguard-manager.error.log;
    
    # 主页面
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # API接口
    location /api/ {
        try_files $uri $uri/ /api/index.php;
        
        # PHP处理
        location ~ \.php$ {
            fastcgi_pass unix:/var/run/php/php7.4-fpm.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }
    }
    
    # 静态文件
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # 安全配置
    location ~ /\. {
        deny all;
    }
    
    location ~ /(config|logs|backups)/ {
        deny all;
    }
    
    # 客户端配置文件下载
    location /download/ {
        alias /etc/wireguard/clients/;
        add_header Content-Disposition "attachment";
    }
    
    # WebSocket支持（如果需要实时功能）
    location /ws/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
