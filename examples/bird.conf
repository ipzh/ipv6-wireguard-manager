# BIRD BGP 路由器配置示例
# 文件名: bird.conf
# 位置: /etc/bird/bird.conf

# 路由器ID（使用服务器IP地址）
router id 192.168.1.1;

# 日志配置
log syslog all;
log stderr all;

# 设备协议
protocol device {
    scan time 10;
}

# 内核协议（学习系统路由）
protocol kernel {
    learn;
    scan time 20;
    import all;
    export all;
    merge paths on;
}

# 直连协议
protocol direct {
    interface "wg*", "eth*", "ens*", "enp*", "enx*";
    check link yes;
}

# BGP协议配置
protocol bgp BGP_NEIGHBOR_1 {
    # 本地AS号
    local as 65001;
    
    # 邻居IP和AS号
    neighbor 192.168.1.2 as 65002;
    
    # 路由策略
    import all;
    export all;
    
    # 下一跳设置
    next hop self;
    
    # BGP参数
    hold time 240;
    keepalive time 80;
    connect retry time 120;
    start delay time 5;
    error wait time 60, 300;
    error forget time 300;
    disable after error off;
    
    # 安全设置
    tcp security on;
}

# 更多BGP邻居配置...
protocol bgp BGP_NEIGHBOR_2 {
    local as 65001;
    neighbor 192.168.1.3 as 65003;
    import all;
    export all;
    next hop self;
    hold time 240;
    keepalive time 80;
    tcp security on;
}

# 静态路由配置
protocol static {
    # 静态路由示例
    route 10.0.0.0/24 via 192.168.1.1;
    route 2001:db8::/64 via 2001:db8::1;
    
    # 导出到BGP
    export all;
}
