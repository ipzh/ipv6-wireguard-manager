# IPv6 WireGuard Client 配置示例
# 文件名: client.conf
# 位置: /etc/wireguard/wg0.conf (客户端)

[Interface]
# 客户端私钥
PrivateKey = YOUR_CLIENT_PRIVATE_KEY

# 客户端地址（IPv4和IPv6）
Address = 10.0.0.2/24, 2001:db8::2/64

# DNS服务器（可选）
DNS = 8.8.8.8, 2001:4860:4860::8888

# 预共享密钥（可选，增强安全性）
# PresharedKey = YOUR_PRESHARED_KEY

# 服务器配置
[Peer]
# 服务器公钥
PublicKey = SERVER_PUBLIC_KEY

# 服务器地址和端口
Endpoint = YOUR_SERVER_IP:51820

# 允许的IP地址范围（0.0.0.0/0 表示所有流量通过VPN）
AllowedIPs = 0.0.0.0/0, ::/0

# 预共享密钥（可选，与服务器端相同）
# PresharedKey = YOUR_PRESHARED_KEY

# 保持连接（推荐设置）
PersistentKeepalive = 25

# 连接超时设置（可选）
# Handshake = 180
# Keepalive = 25
