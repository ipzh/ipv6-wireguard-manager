# IPv6前缀配置示例
# IPv6 WireGuard Manager
# 版本: 1.0.0

# =============================================================================
# IPv6前缀配置示例
# =============================================================================

# 示例1: 基本IPv6前缀配置
# 前缀: 2001:db8::/56
# 长度: 56
# 描述: 主要IPv6前缀

[prefix_main]
prefix=2001:db8::/56
length=56
description=主要IPv6前缀
allocated=false
reserved=false
auto_assign=true
priority=1

# 示例2: 备用IPv6前缀配置
# 前缀: 2001:db8:100::/56
# 长度: 56
# 描述: 备用IPv6前缀

[prefix_backup]
prefix=2001:db8:100::/56
length=56
description=备用IPv6前缀
allocated=false
reserved=false
auto_assign=true
priority=2

# 示例3: 保留IPv6前缀配置
# 前缀: 2001:db8:200::/56
# 长度: 56
# 描述: 保留IPv6前缀

[prefix_reserved]
prefix=2001:db8:200::/56
length=56
description=保留IPv6前缀
allocated=false
reserved=true
auto_assign=false
priority=3

# =============================================================================
# IPv6子网配置示例
# =============================================================================

# 子网1: 服务器子网
[subnet_server]
prefix=2001:db8::/64
length=64
description=服务器子网
allocated=true
reserved=false
auto_assign=false
priority=1
gateway=2001:db8::1
dns_servers=2001:4860:4860::8888,2001:4860:4860::8844

# 子网2: 客户端子网
[subnet_client]
prefix=2001:db8:1::/64
length=64
description=客户端子网
allocated=true
reserved=false
auto_assign=true
priority=2
gateway=2001:db8:1::1
dns_servers=2001:4860:4860::8888,2001:4860:4860::8844

# 子网3: 管理子网
[subnet_management]
prefix=2001:db8:2::/64
length=64
description=管理子网
allocated=true
reserved=false
auto_assign=false
priority=3
gateway=2001:db8:2::1
dns_servers=2001:4860:4860::8888,2001:4860:4860::8844

# 子网4: 测试子网
[subnet_test]
prefix=2001:db8:3::/64
length=64
description=测试子网
allocated=false
reserved=false
auto_assign=true
priority=4
gateway=2001:db8:3::1
dns_servers=2001:4860:4860::8888,2001:4860:4860::8844

# =============================================================================
# IPv6地址池配置示例
# =============================================================================

# 地址池1: 客户端地址池
[pool_client]
subnet=2001:db8:1::/64
start_address=2001:db8:1::2
end_address=2001:db8:1::ffff
description=客户端地址池
auto_assign=true
reserved_addresses=2001:db8:1::1

# 地址池2: 服务器地址池
[pool_server]
subnet=2001:db8::/64
start_address=2001:db8::2
end_address=2001:db8::ff
description=服务器地址池
auto_assign=false
reserved_addresses=2001:db8::1

# 地址池3: 管理地址池
[pool_management]
subnet=2001:db8:2::/64
start_address=2001:db8:2::2
end_address=2001:db8:2::ff
description=管理地址池
auto_assign=false
reserved_addresses=2001:db8:2::1

# =============================================================================
# IPv6路由配置示例
# =============================================================================

# 路由1: 默认路由
[route_default]
network=::/0
gateway=2001:db8::1
description=默认IPv6路由
metric=1
preference=1

# 路由2: 本地网络路由
[route_local]
network=2001:db8::/56
gateway=2001:db8::1
description=本地网络路由
metric=0
preference=1

# 路由3: 客户端网络路由
[route_client]
network=2001:db8:1::/64
gateway=2001:db8:1::1
description=客户端网络路由
metric=0
preference=1

# =============================================================================
# IPv6 DNS配置示例
# =============================================================================

# DNS服务器1: Google DNS
[dns_google]
address=2001:4860:4860::8888
description=Google IPv6 DNS
priority=1
type=recursive

# DNS服务器2: Cloudflare DNS
[dns_cloudflare]
address=2001:4860:4860::8844
description=Cloudflare IPv6 DNS
priority=2
type=recursive

# DNS服务器3: 本地DNS
[dns_local]
address=2001:db8::1
description=本地IPv6 DNS
priority=3
type=authoritative

# =============================================================================
# IPv6 NDP配置示例
# =============================================================================

# NDP配置1: 路由器通告
[ndp_ra]
interface=wg0
enabled=true
managed_flag=true
other_config_flag=true
router_lifetime=1800
reachable_time=0
retrans_timer=0
prefix=2001:db8::/64
prefix_length=64
valid_lifetime=86400
preferred_lifetime=86400
on_link=true
autonomous=true

# NDP配置2: 邻居发现
[ndp_nd]
interface=wg0
enabled=true
solicit_interval=1000
reachable_time=30000
retrans_timer=1000
dad_transmits=1

# =============================================================================
# IPv6安全配置示例
# =============================================================================

# 安全配置1: RA防护
[security_ra_guard]
interface=wg0
enabled=true
action=drop
log=true
description=RA防护

# 安全配置2: 邻居发现防护
[security_nd_guard]
interface=wg0
enabled=true
action=drop
log=true
description=邻居发现防护

# 安全配置3: 地址欺骗防护
[security_spoof_guard]
interface=wg0
enabled=true
action=drop
log=true
description=地址欺骗防护

# =============================================================================
# 配置说明
# =============================================================================

# 1. 前缀配置格式:
#    [prefix_名称] - 前缀配置段
#    prefix - IPv6前缀
#    length - 前缀长度
#    description - 描述信息
#    allocated - 是否已分配
#    reserved - 是否保留
#    auto_assign - 是否自动分配
#    priority - 优先级

# 2. 子网配置格式:
#    [subnet_名称] - 子网配置段
#    prefix - IPv6前缀
#    length - 前缀长度
#    description - 描述信息
#    allocated - 是否已分配
#    reserved - 是否保留
#    auto_assign - 是否自动分配
#    priority - 优先级
#    gateway - 网关地址
#    dns_servers - DNS服务器列表

# 3. 地址池配置格式:
#    [pool_名称] - 地址池配置段
#    subnet - 子网
#    start_address - 起始地址
#    end_address - 结束地址
#    description - 描述信息
#    auto_assign - 是否自动分配
#    reserved_addresses - 保留地址列表

# 4. 路由配置格式:
#    [route_名称] - 路由配置段
#    network - 目标网络
#    gateway - 网关地址
#    description - 描述信息
#    metric - 路由度量
#    preference - 路由偏好

# 5. DNS配置格式:
#    [dns_名称] - DNS配置段
#    address - DNS服务器地址
#    description - 描述信息
#    priority - 优先级
#    type - 类型(recursive/authoritative)

# 6. NDP配置格式:
#    [ndp_名称] - NDP配置段
#    interface - 接口名称
#    enabled - 是否启用
#    其他参数根据具体配置类型而定

# 7. 安全配置格式:
#    [security_名称] - 安全配置段
#    interface - 接口名称
#    enabled - 是否启用
#    action - 动作(drop/accept/log)
#    log - 是否记录日志
#    description - 描述信息
