# IPv6前缀配置示例文件
# 此文件定义了可用的IPv6前缀
# 
# 注意: 此配置适用于BIRD 1.x和2.x版本
# BIRD 2.x版本提供更好的性能和IPv6支持
#
# 重要说明:
# - 这些前缀用于BIRD路由宣告
# - WireGuard服务器地址会自动从前缀中生成（如2001:db8::1/64）
# - 客户端地址会从前缀中分配，支持/56到/72的子网段范围
# - 客户端子网掩码会根据网络前缀自动确定

# 主要IPv6前缀
2001:db8::/48

# 备用IPv6前缀
2001:db9::/48
2001:dba::/48

# 子网前缀示例（支持/56到/72范围）
2001:db8:1::/56    # 客户端使用/64子网掩码
2001:db8:2::/57    # 客户端使用/65子网掩码
2001:db8:3::/58    # 客户端使用/66子网掩码
2001:db8:4::/59    # 客户端使用/67子网掩码
2001:db8:5::/60    # 客户端使用/68子网掩码
2001:db8:6::/61    # 客户端使用/69子网掩码
2001:db8:7::/62    # 客户端使用/70子网掩码
2001:db8:8::/63    # 客户端使用/71子网掩码
2001:db8:9::/64    # 客户端使用/72子网掩码
2001:db8:a::/65    # 客户端使用/73子网掩码
2001:db8:b::/66    # 客户端使用/74子网掩码
2001:db8:c::/67    # 客户端使用/75子网掩码
2001:db8:d::/68    # 客户端使用/76子网掩码
2001:db8:e::/69    # 客户端使用/77子网掩码
2001:db8:f::/70    # 客户端使用/78子网掩码
2001:db8:10::/71   # 客户端使用/79子网掩码
2001:db8:11::/72   # 客户端使用/80子网掩码

# 客户端专用前缀
2001:db8:100::/56
2001:db8:200::/56
2001:db8:300::/56

# 服务器专用前缀
2001:db8:1000::/56
2001:db8:2000::/56
2001:db8:3000::/56

# 移动设备专用前缀
2001:db8:4000::/56
2001:db8:5000::/56
2001:db8:6000::/56
