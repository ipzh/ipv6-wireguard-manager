# BGP邻居配置示例文件
# 格式: 邻居名称,IP地址,AS号,描述
#
# 注意: 此配置适用于BIRD 1.x和2.x版本
# BIRD 2.x版本提供更好的BGP性能和稳定性

# 上游ISP
upstream1,2001:db8::1,65000,主要上游ISP
upstream2,2001:db8::2,65001,备用上游ISP

# 对等连接
peer1,2001:db8::10,65010,对等连接1
peer2,2001:db8::11,65011,对等连接2

# 客户连接
customer1,2001:db8::100,65100,客户1
customer2,2001:db8::101,65101,客户2

# 测试连接
test1,2001:db8::200,65200,测试连接1
test2,2001:db8::201,65201,测试连接2
