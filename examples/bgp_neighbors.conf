# BGP邻居配置示例
# IPv6 WireGuard Manager
# 版本: 1.0.0

# =============================================================================
# BGP邻居配置示例
# =============================================================================

# 示例1: 基本BGP邻居配置
# 邻居名称: provider1
# 邻居IP: 203.0.113.1
# 邻居AS: 65001
# 本地AS: 64512
# 描述: 主要ISP提供商

[neighbor_provider1]
name=provider1
ip=203.0.113.1
as=65001
local_as=64512
description=主要ISP提供商
hold_time=90
keepalive_time=30
connect_retry_time=60
connect_retry_count=3
next_hop_self=true
import_filter=accept_all
export_filter=export_wireguard_networks

# 示例2: 备用BGP邻居配置
# 邻居名称: provider2
# 邻居IP: 203.0.113.2
# 邻居AS: 65002
# 本地AS: 64512
# 描述: 备用ISP提供商

[neighbor_provider2]
name=provider2
ip=203.0.113.2
as=65002
local_as=64512
description=备用ISP提供商
hold_time=90
keepalive_time=30
connect_retry_time=60
connect_retry_count=3
next_hop_self=true
import_filter=accept_all
export_filter=export_wireguard_networks

# 示例3: IPv6 BGP邻居配置
# 邻居名称: provider3_ipv6
# 邻居IP: 2001:db8:1::1
# 邻居AS: 65003
# 本地AS: 64512
# 描述: IPv6 ISP提供商

[neighbor_provider3_ipv6]
name=provider3_ipv6
ip=2001:db8:1::1
as=65003
local_as=64512
description=IPv6 ISP提供商
hold_time=90
keepalive_time=30
connect_retry_time=60
connect_retry_count=3
next_hop_self=true
import_filter=accept_all
export_filter=export_wireguard_networks

# 示例4: 对等BGP邻居配置
# 邻居名称: peer1
# 邻居IP: 198.51.100.1
# 邻居AS: 64513
# 本地AS: 64512
# 描述: 对等网络

[neighbor_peer1]
name=peer1
ip=198.51.100.1
as=64513
local_as=64512
description=对等网络
hold_time=90
keepalive_time=30
connect_retry_time=60
connect_retry_count=3
next_hop_self=false
import_filter=accept_peer_routes
export_filter=export_peer_routes

# =============================================================================
# 过滤策略配置
# =============================================================================

# 接受所有路由
[filter_accept_all]
type=import
action=accept
description=接受所有路由

# 导出WireGuard网络
[filter_export_wireguard_networks]
type=export
action=accept
networks=10.0.0.0/24,2001:db8::/64
description=导出WireGuard网络

# 接受对等路由
[filter_accept_peer_routes]
type=import
action=accept
networks=192.168.0.0/16,172.16.0.0/12
description=接受对等网络路由

# 导出对等路由
[filter_export_peer_routes]
type=export
action=accept
networks=10.0.0.0/24,2001:db8::/64
description=导出对等网络路由

# =============================================================================
# 路由策略配置
# =============================================================================

# 路由策略1: 设置本地优先级
[policy_local_pref]
type=route_policy
action=set_local_pref
value=100
description=设置本地优先级为100

# 路由策略2: 添加BGP社区
[policy_add_community]
type=route_policy
action=add_community
value=64512:1
description=添加BGP社区64512:1

# 路由策略3: 设置MED值
[policy_set_med]
type=route_policy
action=set_med
value=0
description=设置MED值为0

# =============================================================================
# 路由映射配置
# =============================================================================

# 路由映射1: 导入映射
[route_map_import]
name=import_map
type=import
sequence=10
match=community
match_value=64512:1
action=set_local_pref
action_value=200
description=导入路由映射

# 路由映射2: 导出映射
[route_map_export]
name=export_map
type=export
sequence=10
match=network
match_value=10.0.0.0/24
action=add_community
action_value=64512:1
description=导出路由映射

# =============================================================================
# 聚合路由配置
# =============================================================================

# 聚合路由1: IPv4聚合
[aggregate_ipv4]
network=10.0.0.0/16
summary_only=true
description=IPv4聚合路由

# 聚合路由2: IPv6聚合
[aggregate_ipv6]
network=2001:db8::/48
summary_only=true
description=IPv6聚合路由

# =============================================================================
# 配置说明
# =============================================================================

# 1. 邻居配置格式:
#    [neighbor_名称] - 邻居配置段
#    name - 邻居名称
#    ip - 邻居IP地址
#    as - 邻居AS号
#    local_as - 本地AS号
#    description - 描述信息
#    hold_time - 保持时间(秒)
#    keepalive_time - 保持活跃时间(秒)
#    connect_retry_time - 连接重试时间(秒)
#    connect_retry_count - 连接重试次数
#    next_hop_self - 是否设置下一跳为自己
#    import_filter - 导入过滤策略
#    export_filter - 导出过滤策略

# 2. 过滤策略格式:
#    [filter_名称] - 过滤策略段
#    type - 类型(import/export)
#    action - 动作(accept/reject)
#    networks - 网络列表(可选)
#    description - 描述信息

# 3. 路由策略格式:
#    [policy_名称] - 路由策略段
#    type - 类型(route_policy)
#    action - 动作(set_local_pref/add_community/set_med)
#    value - 值
#    description - 描述信息

# 4. 路由映射格式:
#    [route_map_名称] - 路由映射段
#    name - 映射名称
#    type - 类型(import/export)
#    sequence - 序列号
#    match - 匹配条件
#    match_value - 匹配值
#    action - 动作
#    action_value - 动作值
#    description - 描述信息

# 5. 聚合路由格式:
#    [aggregate_名称] - 聚合路由段
#    network - 聚合网络
#    summary_only - 是否仅汇总
#    description - 描述信息
