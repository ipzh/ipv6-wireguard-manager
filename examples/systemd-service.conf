# IPv6 WireGuard Manager Systemd 服务配置示例
# 文件名: ipv6-wireguard-manager.service
# 位置: /etc/systemd/system/ipv6-wireguard-manager.service

[Unit]
Description=IPv6 WireGuard Manager
Documentation=https://github.com/ipzh/ipv6-wireguard-manager
After=network.target network-online.target
Wants=network-online.target
Requires=network.target

[Service]
Type=simple
User=root
Group=root
WorkingDirectory=/opt/ipv6-wireguard-manager
ExecStart=/opt/ipv6-wireguard-manager/ipv6-wireguard-manager.sh
ExecReload=/bin/kill -HUP $MAINPID
Restart=always
RestartSec=10
StandardOutput=journal
StandardError=journal
SyslogIdentifier=ipv6-wireguard-manager

# 环境变量
Environment=LOG_LEVEL=INFO
Environment=CONFIG_DIR=/etc/ipv6-wireguard-manager
Environment=LOG_DIR=/var/log/ipv6-wireguard-manager

# 安全设置
NoNewPrivileges=true
PrivateTmp=true
ProtectSystem=strict
ProtectHome=true
ReadWritePaths=/opt/ipv6-wireguard-manager
ReadWritePaths=/etc/ipv6-wireguard-manager
ReadWritePaths=/var/log/ipv6-wireguard-manager
ReadWritePaths=/var/backups/ipv6-wireguard

# 资源限制
LimitNOFILE=65536
LimitNPROC=4096

# 进程管理
KillMode=mixed
KillSignal=SIGTERM
TimeoutStopSec=30

[Install]
WantedBy=multi-user.target
