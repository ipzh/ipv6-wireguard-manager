name: Enhanced CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

env:
  PROJECT_NAME: ipv6-wireguard-manager
  CURRENT_VERSION: "1.0.0"

jobs:
  # 代码质量检查
  code_quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Bash
      run: echo "Bash version: $(bash --version)"
      
    - name: Install ShellCheck
      run: sudo apt-get install -y shellcheck
      
    - name: Run ShellCheck
      run: |
        echo "Running ShellCheck on Shell scripts..."
        find . -name "*.sh" -type f | while read -r file; do
          echo "Checking: $file"
          shellcheck -x "$file" || true
        done
        
    - name: Security Scan
      run: |
        echo "Security Scanning..."
        # 检查硬编码密码
        echo "Checking for hardcoded passwords..."
        grep -r "password.*=" modules/ || echo "No hardcoded passwords found"
        
        # 检查命令注入风险
        echo "Checking for eval usage..."
        grep -r "eval" modules/ || echo "No dangerous eval usage found"
        
    - name: Generate security report
      run: |
        mkdir -p security_reports
        echo "# Security Scan Report" > security_reports/security_report.md
        echo "Scan Date: $(date)" >> security_reports/security_report.md
        echo "" >> security_reports/security_report.md
        
        # 检查高风险模式
        high_risk_count=$(grep -r "eval\|exec" modules/ | wc -l || echo "0")
        echo "High Risk Patterns: $high_risk_count" >> security_reports/security_report.md
        
    - name: Upload security report
      uses: actions/upload-artifact@v3
      with:
        name: security-report
        path: security_reports/

  # 性能基准测试
  performance_tests:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up test environment
      run: |
        sudo apt-get update
        sudo apt-get install -y wireguard iptables curl wget
        
    - name: Run performance benchmarks
      run: |
        echo "Running performance benchmarks..."
        chmod +x modules/performance_benchmark.sh
        
        # 执行性能测试
        bash modules/performance_benchmark.sh || echo "Benchmarks completed with warnings"
        
    - name: Generate performance report
      run: |
        mkdir -p performance_reports
        cp /var/log/ipv6-wireguard-manager/performance_* performance_reports/ || echo "No performance logs found"
        
    - name: Upload performance report
      uses: actions/upload-artifact@v3
      with:
        name: performance-report
        path: performance_reports/

  # 综合功能测试
  comprehensive_tests:
    name: Comprehensive Test Suite
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        shell: [bash]
        environment: [linux, wsl]
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up test environment (${{ matrix.environment }})
      run: |
        echo "Setting up ${{ matrix.environment }} environment..."
        sudo apt-get update
        sudo apt-get install -y wireguard-tools curl wget
        
        # WSL环境模拟
        if [[ "${{ matrix.environment }}" == "wsl" ]]; then
          sudo ln -sf /bin/bash /usr/bin/wsl-bash || true
          export WSL_DISTRO_NAME="test-distro"
        fi
        
    - name: Run test suite
      run: |
        chmod +x modules/comprehensive_test_suite.sh
        chmod +x modules/enhanced_testing.sh
        
        # 执行测试套件
        echo "Running comprehensive test suite..."
        bash modules/comprehensive_test_suite.sh
        
    - name: Generate test report
      run: |
        mkdir -p test_reports
        find /var/log/ipv6-wireguard-manager -name "*test*" -type f | head -10 | xargs -I {} cp {} test_reports/ || echo "No test logs found"
        
    - name: Upload test results
      uses: actions/upload-artifact@v3
      with:
        name: test-results-${{ matrix.environment }}
        path: test_reports/

  # Docker构建和测试
  docker_tests:
    name: Docker Build & Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker image
      run: |
        docker build -t ${{ env.PROJECT_NAME }}:${{ env.CURRENT_VERSION }} .
        docker build -t ${{ env.PROJECT_NAME }}:latest .
        
    - name: Test Docker image
      run: |
        # 测试镜像启动
        docker run --rm ${{ env.PROJECT_NAME }}:${{ env.CURRENT_VERSION }} --help || echo "Docker test completed"
        
    - name: Login to Container Registry
      if: github.event_name == 'release'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Push Docker images
      if: github.event_name == 'release'
      run: |
        docker tag ${{ env.PROJECT_NAME }}:${{ env.CURRENT_VERSION }} ghcr.io/${{ github.repository }}/${{ env.PROJECT_NAME }}:${{ env.CURRENT_VERSION }}
        docker tag ${{ env.PROJECT_NAME }}:latest ghcr.io/${{ github.repository }}/${{ env.PROJECT_NAME }}:latest
        
        docker push ghcr.io/${{ github.repository }}/${{ env.PROJECT_NAME }}:${{ env.CURRENT_VERSION }}
        docker push ghcr.io/${{ github.repository }}/${{ env.PROJECT_NAME }}:latest

  # 文档生成
  documentation:
    name: Generate Documentation
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Generate API documentation
      run: |
        chmod +x modules/api_doc_generator.sh
        
        echo "Generating API documentation..."
        bash modules/api_doc_generator.sh
        
    - name: Generate deployment guides
      run: |
        mkdir -p generated_docs
        echo "# Deployment Guide" > generated_docs/DEPLOYMENT.md
        echo "Auto-generated on: $(date)" >> generated_docs/DEPLOYMENT.md
        echo "" >> generated_docs/DEPLOYMENT.md
        echo "请使用部署向导进行自动化部署:" >> generated_docs/DEPLOYMENT.md
        echo "bash modules/deployment_wizard.sh" >> generated_docs/DEPLOYMENT.md
        
    - name: Upload documentation
      uses: actions/upload-artifact@v3
      with:
        name: documentation
        path: |
          generated_docs/
          api_docs/

  # 部署验证
  deployment_test:
    name: Deployment Testing
    runs-on: ubuntu-latest
    needs: [code_quality, performance_tests, comprehensive_tests]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Test deployment wizard
      run: |
        chmod +x modules/deployment_wizard.sh
        
        echo "Testing deployment wizard..."
        # 非交互式测试部署向导
        echo "测试部署向导功能是否正常" > deployment_test.log
        bash modules/deployment_wizard.sh --help || echo "Deployment wizard test completed"
        
    - name: Upload deployment test results
      uses: actions/upload-artifact@v3
      with:
        name: deployment-test-results
        path: deployment_test.log

  # 构建汇总
  build_summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [code_quality, performance_tests, comprehensive_tests, docker_tests, documentation, deployment_test]
    if: always()
    
    steps:
    - name: Generate build summary
      run: |
        mkdir -p build_summary
        echo "# Build Summary Report" > build_summary/build_report.md
        echo "Build Date: $(date)" >> build_summary/build_report.md
        echo "Build Status:" >> build_summary/build_report.md
        echo "- Code Quality: ${{ needs.code_quality.result }}" >> build_summary/build_report.md
        echo "- Performance Tests: ${{ needs.performance_tests.result }}" >> build_summary/build_report.md
        echo "- Comprehensive Tests: ${{ needs.comprehensive_tests.result }}" >> build_summary/build_report.md
        echo "- Docker Tests: ${{ needs.docker_tests.result }}" >> build_summary/build_report.md
        echo "- Documentation: ${{ needs.documentation.result }}" >> build_summary/build_report.md
        echo "- Deployment Test: ${{ needs.deployment_test.result }}" >> build_summary/build_report.md
        
        # 整体状态
        if [[ "${{ needs.code_quality.result }}" == "success" ]] && \
           [[ "${{ needs.comprehensive_tests.result }}" == "success" ]] && \
           [[ "${{ needs.docker_tests.result }}" == "success" ]]; then
          echo "Overall Status: ✅ SUCCESS" >> build_summary/build_report.md
        else
          echo "Overall Status: ❌ FAILED" >> build_summary/build_report.md
        fi
        
    - name: Upload build summary
      uses: actions/upload-artifact@v3
      with:
        name: build-summary
        path: build_summary/
