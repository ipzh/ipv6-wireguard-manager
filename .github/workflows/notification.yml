            <li><strong>工作流ID</strong>: ${{ github.event.workflow_run.id }}</li>
            <li><strong>运行时间</strong>: ${{ github.event.workflow_run.run_started_at }}</li>
            <li><strong>持续时间</strong>: ${{ github.event.workflow_run.run_duration_ms || 'N/A' }}ms</li>
            <li><strong>触发事件</strong>: ${{ github.event.workflow_run.event }}</li>
