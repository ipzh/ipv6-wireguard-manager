name: Notification & Reporting System

on:
  workflow_run:
    workflows: ["Enhanced IPv6-WireGuard Manager CI/CD", "Security Scanning & Vulnerability Assessment", "Performance Benchmark & Load Testing", "Cross-Platform Compatibility Testing", "Automated Deployment"]
    types: [completed, requested]
  schedule:
    # 每天上午9点发送日�?
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      notification_type:
        description: '通知类型'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly
          - monthly
          - custom

env:
  IPV6WGM_VERSION: "1.0.0"
  NOTIFICATION_MODE: "comprehensive"

jobs:
  # 工作流状态通知
  workflow-notification:
    name: 工作流状态通知
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'workflow_run'
    
    steps:
    - name: 检查工作流状�?
      id: workflow_status
      run: |
        echo "工作流状�? ${{ github.event.workflow_run.conclusion }}"
        echo "工作流名�? ${{ github.event.workflow_run.name }}"
        echo "工作流ID: ${{ github.event.workflow_run.id }}"
        echo "触发分支: ${{ github.event.workflow_run.head_branch }}"
        echo "提交哈希: ${{ github.event.workflow_run.head_sha }}"
        
        # 设置状�?
        if [[ "${{ github.event.workflow_run.conclusion }}" == "success" ]]; then
          echo "status=success" >> $GITHUB_OUTPUT
          echo "emoji=�? >> $GITHUB_OUTPUT
          echo "color=good" >> $GITHUB_OUTPUT
        elif [[ "${{ github.event.workflow_run.conclusion }}" == "failure" ]]; then
          echo "status=failure" >> $GITHUB_OUTPUT
          echo "emoji=�? >> $GITHUB_OUTPUT
          echo "color=danger" >> $GITHUB_OUTPUT
        elif [[ "${{ github.event.workflow_run.conclusion }}" == "cancelled" ]]; then
          echo "status=cancelled" >> $GITHUB_OUTPUT
          echo "emoji=⏹️" >> $GITHUB_OUTPUT
          echo "color=warning" >> $GITHUB_OUTPUT
        else
          echo "status=unknown" >> $GITHUB_OUTPUT
          echo "emoji=�? >> $GITHUB_OUTPUT
          echo "color=warning" >> $GITHUB_OUTPUT
        fi
        
    - name: 生成工作流通知
      run: |
        echo "生成工作流通知..."
        
        # 创建通知消息
        cat > workflow-notification.md << EOF
        # ${{ steps.workflow_status.outputs.emoji }} 工作流状态通知
        
        **工作流名�?*: ${{ github.event.workflow_run.name }}
        **状�?*: ${{ steps.workflow_status.outputs.status }}
        **分支**: ${{ github.event.workflow_run.head_branch }}
        **提交**: \`${{ github.event.workflow_run.head_sha }}\`
        **时间**: $(date)
        
        **工作流链�?*: [${{ github.event.workflow_run.html_url }}](${{ github.event.workflow_run.html_url }})
        
        ---
        
        ## 详细信息
        
        - **工作流ID**: ${{ github.event.workflow_run.id }}
        - **运行时间**: ${{ github.event.workflow_run.run_started_at }}
        - **持续时间**: ${{ github.event.workflow_run.run_duration_ms || 'N/A' }}ms
        - **触发事件**: ${{ github.event.workflow_run.event }}
        
        ## 下一�?
        
        ${{ steps.workflow_status.outputs.status == 'success' && '�?工作流执行成功，可以继续下一步操�? || '�?工作流执行失败，请检查错误日志并修复问题' }}
        EOF
        
    - name: 发送Slack通知
      if: env.SLACK_WEBHOOK_URL
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ steps.workflow_status.outputs.status }}
        channel: '#ci-cd'
        text: |
          ${{ steps.workflow_status.outputs.emoji }} IPv6-WireGuard Manager CI/CD
          工作�? ${{ github.event.workflow_run.name }}
          状�? ${{ steps.workflow_status.outputs.status }}
          分支: ${{ github.event.workflow_run.head_branch }}
          链接: ${{ github.event.workflow_run.html_url }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        
    - name: 发送邮件通知
      if: env.EMAIL_NOTIFICATIONS == 'true'
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "[${{ steps.workflow_status.outputs.emoji }}] IPv6-WireGuard Manager CI/CD - ${{ github.event.workflow_run.name }}"
        to: ${{ secrets.NOTIFICATION_EMAIL }}
        from: ${{ secrets.EMAIL_USERNAME }}
        body: |
          <h2>${{ steps.workflow_status.outputs.emoji }} 工作流状态通知</h2>
          
          <p><strong>工作流名�?/strong>: ${{ github.event.workflow_run.name }}</p>
          <p><strong>状�?/strong>: ${{ steps.workflow_status.outputs.status }}</p>
          <p><strong>分支</strong>: ${{ github.event.workflow_run.head_branch }}</p>
          <p><strong>提交</strong>: <code>${{ github.event.workflow_run.head_sha }}</code></p>
          <p><strong>时间</strong>: $(date)</p>
          
          <p><strong>工作流链�?/strong>: <a href="${{ github.event.workflow_run.html_url }}">查看详情</a></p>
          
          <hr>
          
          <h3>详细信息</h3>
